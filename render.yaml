services:
  - type: web
    name: vambe-dashboard
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vambe-db
          property: connectionString
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_URL
        value: https://token-plan-sgp.xiaomimimo.com/v1
      - key: LLM_MODEL
        value: mimo-v2.5-pro
      - key: MAX_RECORDS_TO_CATEGORIZE
        value: "100"

databases:
  - name: vambe-db
    plan: free
    databaseName: vambe
    ipAllowList: []
